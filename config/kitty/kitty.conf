# ─── Appearance ──────────────────────────────────────────────────────────────
hide_window_decorations titlebar-only
background_opacity 1.0
window_padding_width 0
macos_titlebar_color background

# ─── Font ────────────────────────────────────────────────────────────────────
# font_family      JetBrains Mono
# bold_font        auto
# italic_font      auto
# bold_italic_font auto
font_size        13.0
disable_ligatures never

# Nerd Font symbols from Hack Nerd Font Mono
symbol_map U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0C8,U+E0CA,U+E0CC-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B1,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F32F,U+F400-U+F4A9,U+F500-U+F8FF,U+F0001-U+F1AF0 Hack Nerd Font Mono

# ─── Tab bar ─────────────────────────────────────────────────────────────────
tab_bar_edge        top
tab_bar_style       powerline
tab_powerline_style round
tab_bar_min_tabs    2
tab_title_template        {title}
active_tab_title_template {title}

progress_bar top

# ─── Inactive pane dimming ────────────────────────────────────────────────────
inactive_text_alpha 0.7

# ─── Layouts ─────────────────────────────────────────────────────────────────
enabled_layouts splits,stack,fat:bias=80;full_size=1;mirrored=false,tall,grid

# ─── Misc ────────────────────────────────────────────────────────────────────
env TERM_PROGRAM=kitty
allow_remote_control socket-only
listen_on            unix:~/.local/share/kitty/mykitty-{kitty_pid}
shell_integration    enabled
scrollback_lines     10000

# ─── Window navigation (Ctrl + j/k/l/;) ──────────────────────────────────────
# j=left, k=bottom, l=top, ;=right
# --when-focus-on var:IS_NVIM passes the key to nvim (set by smart-splits.nvim)
map ctrl+j neighboring_window left
map ctrl+k neighboring_window bottom
map ctrl+l neighboring_window top
map ctrl+; neighboring_window right

map --when-focus-on var:IS_NVIM ctrl+j send_key ctrl+j
map --when-focus-on var:IS_NVIM ctrl+k send_key ctrl+k
map --when-focus-on var:IS_NVIM ctrl+l send_key ctrl+l
map --when-focus-on var:IS_NVIM ctrl+; send_key ctrl+semicolon

# ─── Pane resize (Alt + j/k/l/;) ─────────────────────────────────────────────
# relative_resize.py from smart-splits.nvim handles edge cases correctly
map alt+j kitten relative_resize.py left  3
map alt+k kitten relative_resize.py down  3
map alt+l kitten relative_resize.py up    3
map alt+; kitten relative_resize.py right 3

map --when-focus-on var:IS_NVIM alt+j send_key alt+j
map --when-focus-on var:IS_NVIM alt+k send_key alt+k
map --when-focus-on var:IS_NVIM alt+l send_key alt+l
map --when-focus-on var:IS_NVIM alt+; send_key alt+semicolon

# ─── Scrolling ───────────────────────────────────────────────────────────────
map ctrl+u         scroll_page_up
map ctrl+d         scroll_page_down
map ctrl+shift+u   scroll_page_up
map ctrl+shift+d   scroll_page_down

# ─── Leader key bindings (Ctrl+Y prefix) ─────────────────────────────────────

# Pane splitting
map ctrl+y>v launch --location=vsplit --cwd=current
map ctrl+y>h launch --location=hsplit --cwd=current
map ctrl+y>H launch --location=hsplit --cwd=current --bias=30

# Pane zoom (toggle stack layout — equivalent to TogglePaneZoomState)
map ctrl+y>z toggle_layout stack

# Close pane / tab
map ctrl+y>w close_window
map ctrl+y>shift+w close_tab

map ctrl+y>r launch --type=background sh -c "$HOME/.config/kitty/sync-theme.sh"
# Full kitty config reload (note: resets manual font-size changes)
map ctrl+y>R load_config_file

# ─── Sessions ────────────────────────────────────────────────────────────────
# Browse all sessions with picker
map ctrl+y>s goto_session ~/.config/kitty/sessions
# Jump back to previous session
map ctrl+y>- goto_session -1

# ─── kitty-scrollback.nvim ───────────────────────────────────────────────────
action_alias kitty_scrollback_nvim kitten '/Users/bartek/.local/share/nvim/site/pack/core/opt/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py'
# Browse scrollback buffer in nvim
map ctrl+y>enter  kitty_scrollback_nvim
map kitty_mod+h   kitty_scrollback_nvim
# Browse output of last shell command in nvim
map kitty_mod+g   kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output

# Lazygit overlay — closes automatically when lazygit exits
map ctrl+y>g launch --type=overlay --cwd=current lazygit

# Rotate through windows / layouts
map ctrl+y>space next_window
map ctrl+shift+space next_layout

# Send Ctrl+A (e.g. for nested tmux)
map ctrl+y>ctrl+a send_text all \x01

# New window in current dir
map cmd+shift+enter no_op
map ctrl+shift+enter kitten hints --type path --program @

# Command palette
map cmd+shift+p command_palette

# ─── Disable conflicting macOS defaults ──────────────────────────────────────
map cmd+w     no_op
map cmd+enter no_op
# text_composition_strategy legacy
text_composition_strategy platform

# ─── Theme ───────────────────────────────────────────────────────────────────
# Switch with: ln -sf tokyonight_moon.conf current-theme.conf  (dark)
#              ln -sf tokyonight_day.conf  current-theme.conf  (light)
# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family="Iosevka"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
